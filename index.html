<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periodic Table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #fafaf8;
            --bg-secondary: #f5f4f1;
            --text-primary: #2a2826;
            --text-secondary: #6b6662;
            --text-tertiary: #9a9490;
            --border-subtle: #e8e6e2;
            --shadow-sm: 0 1px 3px rgba(42, 40, 38, 0.06);
            --shadow-md: 0 4px 12px rgba(42, 40, 38, 0.08);
            --shadow-lg: 0 12px 32px rgba(42, 40, 38, 0.12);
            
            /* Category colors - muted and serene */
            --cat-nonmetal: #d4e4e8;
            --cat-noble-gas: #e8dfe4;
            --cat-alkali: #e8e0d4;
            --cat-alkaline: #dde4d8;
            --cat-metalloid: #e4ddd8;
            --cat-halogen: #e0e8e4;
            --cat-metal: #d8dde4;
            --cat-transition: #d8e2ec;
            --cat-lanthanide: #e8e2f0;
            --cat-actinide: #f0e2e2;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
        }
        
        header {
            text-align: center;
            padding: 4rem 2rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            font-family: 'Crimson Pro', Georgia, serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 300;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }
        
        .subtitle {
            font-size: 0.95rem;
            font-weight: 400;
            color: var(--text-secondary);
            letter-spacing: 0.01em;
        }
        
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, 1fr);
            gap: 0.375rem;
            margin: 2rem 0;
        }
        
        .element {
            aspect-ratio: 1;
            background: white;
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        
        .element::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.5) 100%);
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        
        .element:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--text-tertiary);
        }
        
        .element:hover::before {
            opacity: 1;
        }
        
        .element:active {
            transform: translateY(0);
        }
        
        .atomic-number {
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--text-tertiary);
            position: relative;
            z-index: 1;
        }
        
        .symbol {
            font-family: 'Crimson Pro', Georgia, serif;
            font-size: clamp(1.25rem, 2vw, 1.75rem);
            font-weight: 400;
            color: var(--text-primary);
            text-align: center;
            margin: auto 0;
            position: relative;
            z-index: 1;
        }
        
        .name {
            font-size: 0.65rem;
            font-weight: 400;
            color: var(--text-secondary);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            position: relative;
            z-index: 1;
        }
        
        /* Category-specific colors */
        .element[data-category="Nonmetal"] {
            background: var(--cat-nonmetal);
        }
        
        .element[data-category="Noble gas"] {
            background: var(--cat-noble-gas);
        }
        
        .element[data-category="Alkali metal"] {
            background: var(--cat-alkali);
        }
        
        .element[data-category="Alkaline earth metal"] {
            background: var(--cat-alkaline);
        }
        
        .element[data-category="Metalloid"] {
            background: var(--cat-metalloid);
        }
        
        .element[data-category="Halogen"] {
            background: var(--cat-halogen);
        }
        
        .element[data-category="Post-transition metal"] {
            background: var(--cat-metal);
        }

        .element[data-category="Transition metal"] {
            background: var(--cat-transition);
        }
        
        .element[data-category="Lanthanide"] {
            background: var(--cat-lanthanide);
        }
        
        .element[data-category="Actinide"] {
            background: var(--cat-actinide);
        }
        
        /* Position elements in the grid */
        .element[data-group="1"][data-period="1"] { grid-column: 1; grid-row: 1; }
        .element[data-group="18"][data-period="1"] { grid-column: 18; grid-row: 1; }
        .element[data-group="1"][data-period="2"] { grid-column: 1; grid-row: 2; }
        .element[data-group="18"][data-period="2"] { grid-column: 18; grid-row: 2; }
        .element[data-group="13"][data-period="2"] { grid-column: 13; grid-row: 2; }
        .element[data-group="14"][data-period="2"] { grid-column: 14; grid-row: 2; }
        .element[data-group="15"][data-period="2"] { grid-column: 15; grid-row: 2; }
        .element[data-group="16"][data-period="2"] { grid-column: 16; grid-row: 2; }
        .element[data-group="17"][data-period="2"] { grid-column: 17; grid-row: 2; }
        
        .element[data-period="3"] { grid-row: 3; }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(42, 40, 38, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .modal {
            background: white;
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 480px;
            width: 90%;
            box-shadow: var(--shadow-lg);
            transform: scale(0.95) translateY(10px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border-subtle);
        }
        
        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }
        
        .modal-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-subtle);
        }
        
        .modal-symbol {
            font-family: 'Crimson Pro', Georgia, serif;
            font-size: 4rem;
            font-weight: 300;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        
        .modal-name {
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }
        
        .modal-atomic {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-tertiary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        
        .modal-properties {
            display: grid;
            gap: 1rem;
        }
        
        .property {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--bg-secondary);
        }
        
        .property:last-child {
            border-bottom: none;
        }
        
        .property-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .property-value {
            font-size: 0.875rem;
            font-weight: 400;
            color: var(--text-primary);
        }
        
        .close-button {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-secondary);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: var(--text-secondary);
        }
        
        .close-button:hover {
            background: var(--border-subtle);
            color: var(--text-primary);
        }
        
        .close-button::before,
        .close-button::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 2px;
            background: currentColor;
        }
        
        .close-button::before {
            transform: rotate(45deg);
        }
        
        .close-button::after {
            transform: rotate(-45deg);
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .periodic-table {
                gap: 0.25rem;
            }
            
            .element {
                padding: 0.375rem;
            }
            
            .symbol {
                font-size: 1.25rem;
            }
        }
        
        @media (max-width: 768px) {
            header {
                padding: 2rem 1.5rem 1rem;
            }
            
            main {
                padding: 1rem;
            }
            
            .periodic-table {
                overflow-x: auto;
                overflow-y: hidden;
                -webkit-overflow-scrolling: touch;
                margin: 1rem -1rem;
                padding: 0 1rem;
            }
            
            .element {
                min-width: 60px;
                min-height: 60px;
            }
            
            .modal {
                padding: 2rem;
            }
            
            .modal-symbol {
                font-size: 3rem;
            }
        }
        
        /* Loading state */
        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Periodic Table</h1>
        <p class="subtitle">A serene exploration of the elements</p>
    </header>
    
    <main>
        <div class="periodic-table" id="periodicTable">
            <div class="loading">Loading elements...</div>
        </div>
    </main>
    
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="close-button" id="closeButton" aria-label="Close"></button>
            <div class="modal-header">
                <div class="modal-symbol" id="modalSymbol"></div>
                <div class="modal-name" id="modalName"></div>
                <div class="modal-atomic" id="modalAtomic"></div>
            </div>
            <div class="modal-properties" id="modalProperties"></div>
        </div>
    </div>
    
    <script>
        let elementsData = [];
        
        // Load CSV data
        async function loadElements() {
            try {
                const response = await fetch('elements.csv');
                const csvText = await response.text();
                
                const lines = csvText.trim().split('\n');
                const headers = lines[0].split(',');
                
                elementsData = lines.slice(1).map(line => {
                    const values = line.split(',');
                    const element = {};
                    headers.forEach((header, index) => {
                        element[header.trim()] = values[index]?.trim() || '';
                    });
                    return element;
                });
                
                renderPeriodicTable();
            } catch (error) {
                document.getElementById('periodicTable').innerHTML = 
                    '<div class="loading">Error loading elements. Please ensure elements.csv is in the same directory.</div>';
                console.error('Error loading elements:', error);
            }
        }

function createElementTile(element) {
    const tile = document.createElement('div');
    tile.className = 'element';

    tile.setAttribute('data-category', element.category);
    tile.setAttribute('data-group', element.group);
    tile.setAttribute('data-period', element.period);

    // Only position main table elements
    if (element.group && element.period) {
        tile.style.gridColumn = element.group;
        tile.style.gridRow = element.period;
    }

    tile.innerHTML = `
        <div class="atomic-number">${element.atomic_number}</div>
        <div class="symbol">${element.symbol}</div>
        <div class="name">${element.name}</div>
    `;

    tile.addEventListener('click', () => openModal(element));

    return tile;
}
        
// Render the periodic table
function renderPeriodicTable() {
    const table = document.getElementById('periodicTable');
    table.innerHTML = '';

    const lanthanides = [];
    const actinides = [];

    elementsData.forEach(element => {
        // Separate f-block
        if (element.category === 'Lanthanide') {
            lanthanides.push(element);
            return;
        }
        if (element.category === 'Actinide') {
            actinides.push(element);
            return;
        }

        const tile = createElementTile(element);
        table.appendChild(tile);
    });

    // Add spacer row
    const spacer = document.createElement('div');
    spacer.style.gridColumn = "1 / span 18";
    spacer.style.height = "10px";
    table.appendChild(spacer);

    // Lanthanides row (row 8)
    lanthanides.forEach((el, i) => {
        const tile = createElementTile(el);
        tile.style.gridColumn = i + 4; // starts under group 3
        tile.style.gridRow = 8;
        table.appendChild(tile);
    });

    // Actinides row (row 9)
    actinides.forEach((el, i) => {
        const tile = createElementTile(el);
        tile.style.gridColumn = i + 4;
        tile.style.gridRow = 9;
        table.appendChild(tile);
    });


    const label1 = document.createElement('div');
        label1.textContent = "Lanthanides";
        label1.style.gridColumn = "1 / span 3";
        label1.style.gridRow = 8;
        table.appendChild(label1);
        
        const label2 = document.createElement('div');
        label2.textContent = "Actinides";
        label2.style.gridColumn = "1 / span 3";
        label2.style.gridRow = 9;
        table.appendChild(label2);
}
        
        // Open modal with element details
        function openModal(element) {
            document.getElementById('modalSymbol').textContent = element.symbol;
            document.getElementById('modalName').textContent = element.name;
            document.getElementById('modalAtomic').textContent = `Atomic Number ${element.atomic_number}`;
            
            const properties = [
                { label: 'Atomic Mass', value: element.atomic_mass },
                { label: 'Category', value: element.category },
                { label: 'Phase', value: element.phase },
                { label: 'Group', value: element.group },
                { label: 'Period', value: element.period }
            ];
            
            const propertiesHtml = properties.map(prop => `
                <div class="property">
                    <span class="property-label">${prop.label}</span>
                    <span class="property-value">${prop.value}</span>
                </div>
            `).join('');
            
            document.getElementById('modalProperties').innerHTML = propertiesHtml;
            document.getElementById('modalOverlay').classList.add('active');
        }
        
        // Close modal
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }
        
        document.getElementById('closeButton').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) {
                closeModal();
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
        
        // Initialize
        loadElements();

        
    </script>
</body>
</html>
